name: FerroVault CD (Release)

# O Gatilho: O robô só acorda quando você empurrar uma "Tag" de versão (ex: v0.1.0)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Permissão de segurança necessária para o robô poder "escrever" na aba Releases do GitHub
permissions:
  contents: write

jobs:
  build-and-publish:
    name: 🚀 Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    # A Matriz: Compila para os 3 maiores sistemas operacionais do mundo simultaneamente
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ferrovault
            release_name: ferrovault-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ferrovault.exe
            release_name: ferrovault-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ferrovault
            release_name: ferrovault-macos-amd64

    steps:
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: ⚡ Build de Produção (Otimização Máxima)
        # O modo --release tira o peso de debug, deixando o executável brutalmente rápido
        run: cargo build --release --target ${{ matrix.target }}

      - name: 📦 Renomear Binário para o Padrão de Release
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          mv ${{ matrix.artifact_name }} ${{ matrix.release_name }}

      - name: 📤 Upload para GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.release_name }}
          # Gera um changelog automático baseado nos seus commits
          generate_release_notes: true