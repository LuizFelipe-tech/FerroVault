name: FerroVault CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_audit:
    name: 🛡️ Audit & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: ⚡ Rust Cache (Speed Boost)
        uses: Swatinem/rust-cache@v2

      - name: 🧹 Check de Formatação (Rigor Sintático)
        run: cargo fmt --all -- --check

      - name: 🛠️ Instalar Cargo Audit (Binário Rápido)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: 🔐 Auditoria de Segurança
        run: cargo audit

      - name: 🧐 Auditoria do Clippy (Advogado do Diabo)
        run: cargo clippy --all-targets --all-features -- -D warnings -A dead_code -A unused_imports -A unused_variables

      - name: 🏗️ Build (O Teste do Cimento)
        run: cargo build --verbose

      - name: 👾 Testes Unitários (Sobrevivendo ao Mundo Invertido)
        run: cargo test --verbose